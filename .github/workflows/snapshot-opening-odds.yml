name: Snapshot opening odds (T-48h)

# Daily opening-line capture for all 5 leagues so `fb tune-ensemble --objective clv`
# has genuine pre-match prices. Runs at 06:00 UTC — well outside typical kickoff
# windows in Europe (earliest kickoffs ~11:00 UTC on Saturdays) so captured rows
# carry a true T-24h+ lead. The append path in api/services.py is gated by
# BettingConfig.snapshot_min_lead_hours (default 6h), so matchday /predictions/today
# calls no longer pollute the opening-line store.

on:
  schedule:
    # 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      t_minus_hours:
        description: "Capture window (hours before kickoff)"
        required: false
        default: "48"

permissions:
  contents: write

concurrency:
  group: snapshot-opening-odds
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package (baseline deps only)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Capture opening-line snapshots (T-${{ github.event.inputs.t_minus_hours || '48' }}h)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          if [ -z "${ODDS_API_KEY:-}" ]; then
            echo "::error::ODDS_API_KEY secret is not configured. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          fb snapshot-odds \
            --league all \
            --t-minus ${{ github.event.inputs.t_minus_hours || 48 }} \
            --source odds_api

      - name: Audit freshness (report-only)
        run: fb snapshot-freshness-audit --league all --min-lead-hours 24 || true

      - name: Commit updated snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/odds_*.jsonl
          if git diff --cached --quiet; then
            echo "No new snapshots to commit."
          else
            stamp=$(date -u +"%Y-%m-%dT%H:%MZ")
            git commit -m "chore(snapshots): opening-line capture $stamp [skip ci]"
            git push
          fi
